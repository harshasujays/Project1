<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Top Adventure Destinations 2026</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #f4f7fb;
      color: #333;
    }

    header {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      padding: 40px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .search-box {
      text-align: center;
      margin: 30px;
    }

    .search-box input {
      padding: 12px 20px;
      width: 320px;
      border-radius: 30px;
      border: 1px solid #ccc;
      font-size: 16px;
      outline: none;
    }

    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 25px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 20px;
    }

    .card-content h3 {
      font-size: 1.3rem;
      margin-bottom: 10px;
    }

    .card-content p {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 15px;
    }

    .tag {
      display: inline-block;
      background: #e3f2fd;
      color: #1565c0;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
    }
    .back-container {
  text-align: center;
  padding: 50px 0;
}

.back-button {
  display: inline-block;
  padding: 12px 30px;
  background: #2563eb;
  color: white;
  text-decoration: none;
  border-radius: 25px;
  font-size: 0.95rem;
  transition: background 0.3s, transform 0.3s;
}

.back-button:hover {
  background: #1e40af;
  transform: translateY(-2px);
}
/* ================= FOOTER ================= */
.footer {
    background: #2f5d7c;
    color: white;
    padding: 40px 10%;
    margin-top: 60px;
}
.footer-grid {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 20px;
}
.footer h4 {
    margin-bottom: 10px;
}

  </style>
</head>
<body>

<header>
  <h1>Top Adventure Destinations 2026</h1>
  <p>Popular & well-known places for thrilling travel experiences</p>
</header>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Search destination or region...">
</div>

<section class="container" id="destinations"></section>
<div class="back-container">
        <a href="../landing.php" class="back-button">← Back to Home</a>
    </div>
    <footer class="footer">
    <div class="footer-grid">
        <div><h4>TripOps</h4><p>Your ultimate travel partner.</p></div>
        <div><h4>Company</h4><p>About Us<br>Careers</p></div>
        <div><h4>Support</h4><p>Help Center<br>Contact</p></div>
        <div><h4>Follow Us</h4><p>Instagram<br>Twitter</p></div>
    </div>
</footer>
<script>
  const destinations = [
    { name: "Switzerland", image: "https://images.unsplash.com/photo-1501785888041-af3ef285b470", desc: "Alpine hiking, paragliding & skiing", tag: "Europe", page: "switzerland.html" },
    { name: "France", image: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34", desc: "Mont Blanc trekking & cycling", tag: "Europe", page: "france.html" },
    { name: "Italy", image: "italy.jpg", desc: "Dolomites hiking & snow sports", tag: "Europe", page: "italy.html" },
    { name: "Austria", image: "austria.webp", desc: "Mountain biking & skiing", tag: "Europe", page: "austria.html" },
    { name: "USA", image: "usa.jpg", desc: "National parks & hiking", tag: "North America", page: "usa.html" },
    { name: "Canada", image: "canada.jpg", desc: "Banff, kayaking & trekking", tag: "North America", page: "canada.html" },
    { name: "Australia", image: "australia.jpg", desc: "Diving, surfing & skydiving", tag: "Oceania", page: "australia.html" },
    { name: "New Zealand", image: "https://images.unsplash.com/photo-1502786129293-79981df4e689", desc: "Bungee jumping & glaciers", tag: "Oceania", page: "newzealand.html" },
    { name: "Japan", image: "https://images.unsplash.com/photo-1549693578-d683be217e58", desc: "Mount Fuji trek & skiing", tag: "Asia", page: "japan.html" },
    { name: "Thailand", image: "thailand.webp", desc: "Island hopping & scuba diving", tag: "Asia", page: "thailand.html" },
    { name: "Bali", image: "bali.jpg", desc: "Volcano trekking & surfing", tag: "Asia", page: "bali.html" },
    { name: "South Africa", image: "south-africa.jpeg", desc: "Safari & shark diving", tag: "Africa", page: "southafrica.html" },
    { name: "India", image: "https://images.unsplash.com/photo-1524492412937-b28074a5d7da", desc: "Himalayan trekking & rafting", tag: "Asia", page: "india.html" },
    { name: "Dubai", image: "https://images.unsplash.com/photo-1528702748617-c64d49f918af", desc: "Desert safari & skydiving", tag: "Middle East", page: "dubai.html" },
    { name: "Spain", image: "spain.jpg", desc: "Hiking & water sports", tag: "Europe", page: "spain.html" },
    { name: "United Kingdom", image: "uk.jpg", desc: "Historic castles, royal heritage, scenic countryside and vibrant cities across England, Scotland, Wales & Northern Ireland.", tag:"England", page:"uk.html"},
  ];

  const container = document.getElementById("destinations");
  const searchInput = document.getElementById("searchInput");

  function displayDestinations(list) {
    container.innerHTML = "";

    list.forEach(place => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${place.image}" alt="${place.name}"
             onerror="this.src='https://via.placeholder.com/400x250?text=Image+Not+Found'">
        <div class="card-content">
          <h3>${place.name}</h3>
          <p>${place.desc}</p>
          <span class="tag">${place.tag}</span>
        </div>
      `;

      card.addEventListener("click", () => {
        window.location.href = place.page;
      });

      container.appendChild(card);
    });
  }

  displayDestinations(destinations);

  searchInput.addEventListener("keyup", () => {
    const value = searchInput.value.toLowerCase();
    const filtered = destinations.filter(d =>
      d.name.toLowerCase().includes(value) ||
      d.tag.toLowerCase().includes(value)
    );
    displayDestinations(filtered);
  });
</script>

</body>
</html>
