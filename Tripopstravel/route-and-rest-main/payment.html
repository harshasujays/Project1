<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Payment | StayOps</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg-gradient: linear-gradient(135deg,#020617,#0f172a);
  --primary: #3b82f6;
  --secondary: #6366f1;
  --card-bg: rgba(255,255,255,0.06);
  --text-color: #e5e7eb;
}

body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background: var(--bg-gradient);
  color: var(--text-color);
}

.wrapper{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
}

.payment-card{
  width:420px;
  padding:40px;
  border-radius:25px;
  background: var(--card-bg);
  backdrop-filter:blur(20px);
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

.payment-card h1{
  text-align:center;
  margin-bottom:30px;
  font-weight:700;
  background:linear-gradient(45deg,var(--primary),var(--secondary));
  background-clip: text;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.summary{
  background: var(--card-bg);
  padding:20px;
  border-radius:18px;
  margin-bottom:25px;
  border:1px solid rgba(255,255,255,0.1);
}

input{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.1);
  color:white;
  outline:none;
}

input::placeholder{
  color:rgba(255,255,255,0.6);
}

.row{
  display:flex;
  gap:15px;
}

.row input{
  flex:1;
}

.pay-btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  background:linear-gradient(45deg,var(--primary),var(--secondary));
  color:white;
  font-weight:700;
  cursor:pointer;
  transition:.3s;
}

.pay-btn:hover{
  transform:scale(1.03);
}

.success{
  text-align:center;
  display:none;
}

.success h2{
  color: var(--primary);
  font-size:28px;
  margin-bottom:10px;
}

.success p{
  opacity:0.8;
}

.ticket-btn{
  margin-top:20px;
  display:inline-block;
  padding:12px 28px;
  border-radius:30px;
  background:linear-gradient(45deg,var(--primary),var(--secondary));
  color:white;
  text-decoration:none;
  font-weight:600;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="payment-card" id="paymentBox">

    <h1>Secure Payment</h1>

    <!-- Booking summary -->
    <div class="summary">
  <p><strong>City:</strong> <span id="city">-</span></p>
  <p><strong>Check-in:</strong> <span id="checkin">-</span></p>
  <p><strong>Check-out:</strong> <span id="checkout">-</span></p>
  <p><strong>Guests:</strong> <span id="guests">-</span></p>
  <p><strong>Total Amount:</strong> ₹<span id="totalAmount">0</span></p>
</div>


    <!-- Fake card form -->
    <input id="cardName" type="text" placeholder="Cardholder Name" required>
<input id="cardNumber" type="text" placeholder="Card Number" maxlength="19" required>

<div class="row">
  <input id="expiry" type="text" placeholder="MM/YY" maxlength="5" required>

  <input id="cvv" type="text" placeholder="CVV" maxlength="3" required>
</div>

    <button class="pay-btn" onclick="processPayment()">
  Pay Securely
</button>


  </div>


  <!-- Success screen -->
  <div class="payment-card success" id="successBox">
    <h2>✔ Booking Confirmed</h2>
    <p>Your luxury stay has been successfully reserved.</p>

    <a class="ticket-btn" href="hotel_ticket.html">
      View Booking Ticket
    </a>
  </div>

</div>


<script>
  const bookingData = JSON.parse(localStorage.getItem("hotelBookingData"));
if (bookingData?.theme?.useCustomTheme) {
  document.body.style.background = bookingData.theme.bgGradient;
  document.body.style.color = bookingData.theme.textColor;

  document.querySelectorAll(".card").forEach(card => {
    card.style.background = bookingData.theme.cardBg;
  });

  document.querySelectorAll(".primary-btn").forEach(btn => {
    btn.style.background = `linear-gradient(45deg,${bookingData.theme.primary},${bookingData.theme.secondary})`;
  });

  document.querySelectorAll(".secondary-btn").forEach(btn => {
    btn.style.borderColor = bookingData.theme.primary;
    btn.style.color = bookingData.theme.primary;
  });
}

  localStorage.removeItem("hotelBookingData");
/* Load booking data */
const data = JSON.parse(localStorage.getItem("hotelBookingData"));

if (data?.theme?.useCustomTheme === true) {

  const root = document.documentElement;

  root.style.setProperty('--bg-gradient', data.theme.bgGradient);
  root.style.setProperty('--primary', data.theme.primary);
  root.style.setProperty('--secondary', data.theme.secondary);
  root.style.setProperty('--card-bg', data.theme.cardBg);
  root.style.setProperty('--text-color', data.theme.textColor);
}
/* Payment validation */
function processPayment() {
  const name = document.getElementById("cardName").value.trim();
  const number = document.getElementById("cardNumber").value.trim();
  const expiry = document.getElementById("expiry").value.trim();
  const cvv = document.getElementById("cvv").value.trim();

  // Empty validation
  if (!name || !number || !expiry || !cvv) {
    alert("Please fill all payment details.");
    return;
  }

  // Card number check
  if (number.length < 12) {
    alert("Enter a valid card number.");
    return;
  }

  // CVV must be exactly 3 digits
  if (cvv.length !== 3) {
    alert("Enter a valid CVV.");
    return;
  }

  // Success UI instead of redirect
  document.getElementById("paymentBox").style.display = "none";
  document.getElementById("successBox").style.display = "block";
}

/* Auto format MM/YY */
const expiryInput = document.getElementById("expiry");

expiryInput.addEventListener("input", function (e) {
  let value = e.target.value.replace(/\D/g, ""); // keep only numbers

  // limit to 4 digits (MMYY)
  value = value.substring(0, 4);

  // add slash after month
  if (value.length >= 3) {
    value = value.substring(0, 2) + "/" + value.substring(2);
  }

  e.target.value = value;
});
</script>
</body>
</html>
